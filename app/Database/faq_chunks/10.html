<p><span style="line-height:20.39px;font-family:dotum;"><span style="color:rgb(0,0,0);">1. 채팅방 내의 <b><span style="color:rgb(0,117,200);">[픽 열기]</span></b>을 클릭합니다.</span></span></p><p><span style="line-height:20.39px;font-family:dotum;"><span style="color:rgb(0,0,0);"><br></span></span></p><p style="line-height:20.39px;font-family:dotum;"><span style="line-height:20.39px;"><span style="color:rgb(0,0,0);">2. 픽 열기 메뉴에서 <span style="color:rgb(0,117,200);"><b>[방장픽표시]</b></span>에 체크를 하시고 <span style="color:rgb(0,117,200);"><b>[픽]</b></span>을 선택합니다.</span></span></p><p style="line-height:20.39px;font-family:dotum;"><span style="line-height:20.39px;"><span style="color:rgb(0,0,0);"><br></span></span></p><p style="line-height:20.39px;font-family:dotum;"><span style="color:rgb(0,0,0);">3. 선택하신 방장픽 내용이 <span style="color:rgb(0,117,200);"><b>채팅창에 표시</b></span>됩니다.</span></p><p style="line-height:20.39px;font-family:dotum;"><span style="color:rgb(0,0,0);">&nbsp;</span></p><p style="line-height:20.39px;font-family:dotum;"><span style="color:rgb(0,0,0);">4. 우측 상단에도 방장픽이 표시됩니다.</span></p><p style="line-height:20.39px;font-family:dotum;"><span style="color:rgb(0,0,0);">&nbsp;</span></p><p style="line-height:20.39px;font-family:dotum;"><span style="color:rgb(0,0,0);">5. 결과 나오는 시간이 되면 픽의 <b><span style="color:rgb(0,117,200);">적중 여부가 표시</span></b>됩니다.</span></p><p style="line-height:20.39px;font-family:dotum;"><span style="color:rgb(0,0,0);">&nbsp;</span></p><p><span style="line-height:20.39px;font-family:dotum;"><span style="color:rgb(0,0,0);">6. 채팅방 개설부터 현재까지의 <b><span style="color:rgb(0,117,200);">픽 통계가 채팅방 제목 옆에 표시</span></b>됩니다.</span></span>&nbsp;</p><p>&nbsp;</p><p><span style="line-height:20.39px;font-family:dotum;"><span style="color:rgb(0,0,0);"></span></span></p><p>&nbsp;</p><p><span style="line-height:20.39px;font-family:dotum;"><span style="color:rgb(0,0,0);"><br style="clear:both;"><img title="cb730c2d385d73c9c773dc122d0bca9c_1591609152_6191.png" src="http://sfile.powerba
